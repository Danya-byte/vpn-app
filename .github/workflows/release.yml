# Release CI — builds the Windows app + installer, hashes it, and attaches the
# artifacts to a GitHub Release on a version tag.
#
# Ships UNSIGNED, on purpose: this is open-source with public releases, so the
# published .sha256 is the integrity check (Authenticode only suppresses the
# SmartScreen prompt — a UX nicety, not a security property, and not worth a paid
# cert for an OSS tool). Users verify the SHA-256 against the release page.
#
# Reproducibility caveat (honest): Flutter Windows builds are NOT bit-for-bit
# reproducible today. We get as close as practical by pinning the Flutter version
# below and the SHA-256-verified cores (tool/fetch-cores.ps1). Pin FLUTTER_VERSION
# to the exact version you build with locally.

name: release

on:
  push:
    tags: ['v*'] # v1.2.3 → a real release
  workflow_dispatch: {} # manual run → test artifacts (no release)

permissions:
  contents: write # create the Release + upload assets

env:
  FLUTTER_VERSION: '3.24.5' # TODO: pin to the exact version you build with

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # package.ps1 stamps the short commit (needs full history/tags)

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Inno Setup (for the installer)
        run: choco install innosetup --no-progress -y

      - run: flutter --version
      - run: flutter pub get

      # SHA-256-pinned cores (sing-box + xray) + rule-sets, per tool/fetch-cores.ps1.
      - name: Fetch pinned cores
        shell: pwsh
        run: ./tool/fetch-cores.ps1 -IncludeXray

      # package.ps1: build (version/commit-stamped) → bundle cores + license/notices
      # → zip + .sha256 → installer.
      - name: Build + package
        shell: pwsh
        run: ./tool/package.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: vpn_app-windows-x64
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256
          if-no-files-found: error

      # Attach to the GitHub Release on a tag push (skipped on manual runs). The
      # .sha256 ships alongside so users can verify the download.
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256
          fail_on_unmatched_files: true
